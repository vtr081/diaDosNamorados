<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="floating-shapes">
        <span class="shape">✨</span>
        <span class="shape">❤️</span>
        <span class="shape">✨</span>
    </div>

    <main class="content-wrapper">

            <p class="subtitle">Feliz dia dos namorados</p>

        <p class="phrase">Dentre todas as constelações que existem por aí, a sua luz é a única que consegue guiar o meu coração.</p>
        
        <div class="btn-container">
            <button class="btn-love">Te amo</button>
        </div>
